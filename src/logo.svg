<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: rounded squircle, app-icon style -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#362FCB"/>

  <!-- Signature glyph: storyboard frames converging into a play frame -->
  <!-- Back frame -->
  <rect x="130" y="140" width="180" height="130" rx="20" ry="20"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="12"
        transform="rotate(-14 220 205)"/>

  <!-- Middle frame -->
  <rect x="150" y="178" width="205" height="148" rx="22" ry="22"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="12"
        transform="rotate(-5 252 252)"/>

  <!-- Front frame (solid, the "final" frame) -->
  <rect x="170" y="215" width="235" height="168" rx="24" ry="24" fill="#FFFFFF"/>

  <!-- Play triangle cut out of the front frame -->
  <polygon points="322.5,299 257.5,261 257.5,337" fill="#362FCB"/>
</svg>
